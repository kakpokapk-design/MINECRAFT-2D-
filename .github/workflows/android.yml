name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Buildozer and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev execstack libstdc++6 ant
        pip3 install --user --upgrade buildozer

    - name: Create Fresh Buildozer Spec
      run: |
        # Удаляем старый файл, если он есть, чтобы избежать конфликтов
        rm -f buildozer.spec
        
        # Генерируем абсолютно новый чистый конфиг со всеми исправлениями
        buildozer init
        
        # Жёстко прописываем согласие с лицензиями и стабильные версии
        sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
        sed -i 's/android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
        sed -i 's/android.api = .*/android.api = 33/' buildozer.spec
        sed -i 's/android.ndk = .*/android.ndk = 25b/' buildozer.spec
        
        # Настраиваем базовые требования для запуска Kivy / Kivymd
        sed -i 's/requirements = python3,kivy/requirements = python3,kivy,kivymd,pillow/' buildozer.spec

    - name: Build with Buildozer
      run: |
        export PATH=$PATH:~/.local/bin
        # Запуск чистой сборки без лишних вопросов
        buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
