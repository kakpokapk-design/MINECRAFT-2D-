name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Buildozer and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev execstack libstdc++6 ant
        pip3 install --user --upgrade "buildozer>=1.5.0"

    - name: Create Fresh Buildozer Spec
      run: |
        # Сносим старый конфиг под ноль
        rm -f buildozer.spec
        buildozer init
        
        # Включаем автопринятие лицензий Google
        sed -i 's/# android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
        sed -i 's/android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
        
        # Жёстко фиксируем проверенные версии Android API и NDK
        sed -i 's/android.api = .*/android.api = 33/' buildozer.spec
        sed -i 's/android.ndk = .*/android.ndk = 25b/' buildozer.spec
        
        # ЧИСТЫЕ ТРЕБОВАНИЯ: Убираем kivymd, оставляем только стабильный kivy и pillow
        sed -i 's/requirements = python3,kivy/requirements = python3,kivy,pillow/' buildozer.spec

    - name: Build with Buildozer
      run: |
        export PATH=$PATH:~/.local/bin
        buildozer android debug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: bin/*.apk
